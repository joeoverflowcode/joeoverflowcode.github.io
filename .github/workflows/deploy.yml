name: Deploy

on:
  push

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - - name: Checkout
      uses: actions/checkout@v2

    - - name: Setup Node
      uses: actions/setup-node@v2
      with:
        node-version: 16

    - - name: Install Vite
      run: npm install vite

    - - name: Build
      run: vite build

    - - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: dist